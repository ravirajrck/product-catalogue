<!-- MOBILE BOTTOM NAVIGATION -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-2 py-2 pb-safe flex justify-around items-center z-50 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
  
  <!-- Store -->
  <a routerLink="/store" 
     routerLinkActive="active-tab"
     [routerLinkActiveOptions]="{exact: true}"
     class="flex flex-col items-center gap-1 text-slate-400 hover:text-[#FF7620] transition-all duration-300 p-2 cursor-pointer active:scale-95 group">
    <svg class="w-6 h-6 transition-all duration-300 group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
    </svg>
    <span class="text-[9px] font-bold uppercase tracking-wider transition-all">Store</span>
  </a>

  <!-- Home -->
  <a routerLink="/store/home" 
     routerLinkActive="active-tab"
     class="flex flex-col items-center gap-1 text-slate-400 hover:text-[#FF7620] transition-all duration-300 p-2 cursor-pointer active:scale-95 group">
    <svg class="w-6 h-6 transition-all duration-300 group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
    </svg>
    <span class="text-[9px] font-bold uppercase tracking-wider transition-all">Home</span>
  </a>

  <!-- Saved -->
  <a routerLink="/store/saved" 
     routerLinkActive="active-tab"
     class="flex flex-col items-center gap-1 text-slate-400 hover:text-[#FF7620] transition-all duration-300 p-2 cursor-pointer active:scale-95 group">
    <svg class="w-6 h-6 transition-all duration-300 group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path>
    </svg>
    <span class="text-[9px] font-bold uppercase tracking-wider transition-all">Saved</span>
  </a>
</nav>

<!-- Desktop Footer (Laptop/Desktop par dikhega) -->
<footer
  class="hidden md:block mt-auto bg-slate-50 border-t border-slate-200 px-12 py-6"
>
  <div
    class="max-w-[1600px] mx-auto flex justify-between items-center text-xs font-bold text-slate-500 uppercase tracking-widest"
  >
    <span>© 2026 RCK DIGITECH</span>
    <div class="space-x-6">
      <a
        routerLink="/store/about"
        class="hover:text-[#FF7620] transition-colors cursor-pointer"
        >About</a
      >
      <a
        routerLink="/store/privacy"
        class="hover:text-[#FF7620] transition-colors cursor-pointer"
        >Privacy</a
      >
      <a
        routerLink="/store/terms"
        class="hover:text-[#FF7620] transition-colors cursor-pointer"
        >Terms</a
      >
      <a
        routerLink="/store/contact"
        class="hover:text-[#FF7620] transition-colors cursor-pointer"
        >Support</a
      >
    </div>
  </div>
</footer>
