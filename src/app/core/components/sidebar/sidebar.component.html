<div
  class="fixed inset-0 z-[60]"
  [class.hidden]="
    !(sidebarService.sidebarOpen$ | async) && !sidebarService.isAnimating
  "
>
  <!-- Backdrop -->
  <div
    (click)="sidebarService.close()"
    class="absolute inset-0 bg-black/20 backdrop-blur-sm transition-opacity duration-300"
    [class.opacity-100]="sidebarService.sidebarOpen$ | async"
    [class.opacity-0]="!(sidebarService.sidebarOpen$ | async)"
  ></div>

  <!-- Sidebar Container -->
  <div
    class="absolute left-0 top-0 h-full w-[280px] bg-white border-r border-orange-100 p-4 shadow-2xl flex flex-col overflow-y-auto"
    [class.animate-in]="sidebarService.sidebarOpen$ | async"
    [class.animate-out]="sidebarService.isAnimating"
  >
    <!-- Top: Close Button -->
    <div class="flex justify-end mb-1">
      <button
        (click)="sidebarService.close()"
        class="text-slate-500 hover:text-[#FF7620] font-semibold text-lg cursor-pointer"
      >
        ✕
      </button>
    </div>

    <!-- Logo (Center) -->
    <div class="flex flex-col items-start justify-center mb-8">
      <a href="/" class="block w-[200px] cursor-pointer">
        <img src="SANATAN3LOGO.svg" alt="Logo" class="w-full h-auto" />
      </a>
    </div>

    <!-- Main Links (Middle) -->
    <div class="mt-6 pt-4 border-t border-slate-100 flex flex-col space-y-0.5">
      <!-- Home -->
      <a
        routerLink="/store/home"
        (click)="sidebarService.close()"
        class="flex items-center gap-3 text-s font-semibold text-slate-600 uppercase hover:text-[#FF7620] transition-colors cursor-pointer py-1"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
          ></path>
        </svg>
        Home
      </a>

      <!-- Dashboard -->
      <a
        *ngIf="isLoggedIn$ | async"
        routerLink="/admin/dashboard"
        (click)="sidebarService.close()"
        class="flex items-center gap-3 text-s font-semibold text-slate-600 uppercase hover:text-[#FF7620] transition-colors cursor-pointer py-1"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"
          ></path>
        </svg>
        Dashboard
      </a>

      <!-- Store -->
      <a
        routerLink="/store"
        (click)="sidebarService.close()"
        class="flex items-center gap-3 text-s font-semibold text-slate-600 uppercase hover:text-[#FF7620] transition-colors cursor-pointer py-1"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"
          ></path>
        </svg>
        Store
      </a>

      <!-- Services (Added right after Store) -->
      <a
        routerLink="/store/services"
        (click)="sidebarService.close()"
        class="flex items-center gap-3 text-s font-semibold text-slate-600 uppercase hover:text-[#FF7620] transition-colors cursor-pointer py-1"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
          ></path>
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
          ></path>
        </svg>
        Services
      </a>

      <!-- Saved -->
      <a
        routerLink="/store/saved"
        (click)="sidebarService.close()"
        class="flex items-center gap-3 text-s font-semibold text-slate-600 uppercase hover:text-[#FF7620] transition-colors cursor-pointer py-1"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
          ></path>
        </svg>
        Saved
      </a>

      <!-- Logout -->
      <a
        *ngIf="isLoggedIn$ | async"
        (click)="onLogout(); sidebarService.close()"
        class="flex items-center gap-3 text-s font-semibold text-slate-600 uppercase hover:text-[#FF7620] transition-colors cursor-pointer py-1"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
          ></path>
        </svg>
        Logout
      </a>
    </div>

    <!-- Policy Links -->
    <div class="mt-6 pt-4 border-t border-slate-100 flex flex-col space-y-0.5">
      <a
        routerLink="/store/about"
        (click)="sidebarService.close()"
        class="flex items-center justify-between text-s text-slate-600 uppercase hover:text-[#FF7620] transition-colors cursor-pointer py-1"
      >
        About Us
      </a>
      <a
        routerLink="/store/privacy"
        (click)="sidebarService.close()"
        class="flex items-center justify-between text-s text-slate-600 uppercase hover:text-[#FF7620] transition-colors cursor-pointer py-1"
      >
        Privacy Policy
      </a>
      <a
        routerLink="/store/terms"
        (click)="sidebarService.close()"
        class="flex items-center justify-between text-s text-slate-600 uppercase hover:text-[#FF7620] transition-colors cursor-pointer py-1"
      >
        Terms & Conditions
      </a>
      <a
        routerLink="/store/contact"
        (click)="sidebarService.close()"
        class="flex items-center justify-between text-s text-slate-600 uppercase hover:text-[#FF7620] transition-colors cursor-pointer py-1"
      >
        Support Center
      </a>
    </div>

    <!-- Bottom: Contact Info -->
    <div class="mt-6 pt-4 border-t border-slate-100 flex flex-col space-y-0.5">
      <span class="text-slate-400">Helpline Number</span>
      <a
        href="tel:+919876543210"
        class="text-slate-700 font-semibold hover:text-[#FF7620] transition-colors"
      >
        +91 98765-43210
      </a>
      <a
        href="mailto:ravirajchoudhary@gmail.com"
        class="text-slate-500 hover:text-[#FF7620] transition-colors"
      >
         sanataninfotech&#64;gmail.in
      </a>
      <a
        href="https://www.sanataninfotech.in"
        target="_blank"
        class="text-slate-500 hover:text-[#FF7620] transition-colors"
      >
        <span class="text-slate-400">www.sanataninfotech.in</span>
      </a>
      <div class="flex flex-col items-start pt-2 gap-0.5">
        <span class="text-slate-400 leading-normal">
          New Radha-Wallbh Market Khargone (451001)
        </span>
      </div>
    </div>
  </div>
</div>
