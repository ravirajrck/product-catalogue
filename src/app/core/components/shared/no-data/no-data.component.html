<div
  class="text-center py-20 text-slate-500 text-sm font-medium tracking-wide flex flex-col items-center justify-center space-y-4 flex-1 bg-white border border-slate-100 rounded-2xl shadow-sm w-full"
>
  <!-- Icon Container -->
  <div
    class="w-16 h-16 rounded-full bg-slate-50 flex items-center justify-center border border-slate-100 text-slate-400"
  >
    <svg
      icon
      class="w-8 h-8"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="1.5"
        d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"
      ></path>
    </svg>
  </div>

  <!-- Text -->
  <div>
    <h3 class="text-base font-bold text-slate-900 uppercase tracking-widest">
      {{ title }}
    </h3>
    <p class="mt-1 font-medium text-slate-400">
      {{ subtitle }}
    </p>
  </div>
</div>
