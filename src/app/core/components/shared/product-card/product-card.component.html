<div
  (click)="onCardClick()"
  class="bg-white border border-slate-100 rounded-2xl overflow-hidden flex flex-col transition-all duration-300 group hover:shadow-lg hover:border-slate-200 cursor-pointer h-full relative"
  [class.opacity-75]="product.inStock === false"
>
  <!-- Image Section -->
  <div class="relative aspect-square w-full bg-slate-50 overflow-hidden">
    <img
      [src]="product.images?.[0].url || 'noimage.png'"
      (error)="onImageError($event)"
      class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
      [alt]="product.name"
    />

    <!-- Out of Stock Badge Overlay -->
    <div
      *ngIf="product.inStock === false"
      class="absolute inset-0 bg-slate-900/40 backdrop-blur-[2px] flex items-center justify-center p-2 text-center"
    >
      <span
        class="bg-orange-400 text-white font-bold text-xs uppercase px-3 py-1.5 rounded-lg shadow-md tracking-wider"
      >
        Out of Stock
      </span>
    </div>

    <!-- Like Button -->
    <button
      type="button"
      (click)="onToggleSaved($event)"
      class="absolute top-2.5 right-2.5 p-2 sm:p-2.5 bg-white/90 backdrop-blur-sm rounded-full shadow-md hover:bg-white transition-all cursor-pointer z-10 group active:scale-90 disabled:cursor-wait"
      [disabled]="isLoading"
    >
      <!-- Heart Icon -->
      <svg
        *ngIf="!isLoading"
        class="w-4 h-4 sm:w-5 sm:h-5 transition-colors duration-300"
        [class.text-[#FF7620]]="saved"
        [class.text-slate-400]="!saved"
        [class.group-hover:text-[#FF7620]]="!saved"
        fill="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
        />
      </svg>

      <i
        *ngIf="isLoading"
        class="fa-solid fa-spinner animate-spin text-[#FF7620] text-xl"
      ></i>
    </button>
  </div>

  <!-- Product Info -->
  <div class="p-3 sm:p-4 flex-1 flex flex-col justify-between">
    <div>
      <!-- Product Name (Bada kiya hai mobile ke liye) -->
      <h3
        class="font-bold text-slate-800 text-sm sm:text-base tracking-wide group-hover:text-[#FF7620] transition-colors line-clamp-1"
      >
        {{ product.name | titlecase }}
      </h3>
      <!-- Description -->
      <p
        class="font-medium text-xs sm:text-sm text-slate-400 mt-1 mb-2 line-clamp-2 leading-relaxed"
      >
        {{ product.description || "" }}
      </p>
    </div>

    <!-- Price & Action Section -->
    <div class="flex flex-col gap-2 pt-2.5 mt-2 border-t border-slate-50">
      <!-- Price Section (Bada aur clear view mobile ke liye) -->
      <div class="flex items-baseline flex-wrap gap-x-1.5 min-w-0">
        <span
          class="text-[#FF7620] font-extrabold text-base sm:text-lg tracking-tight flex items-center"
        >
          <i class="fa-solid fa-indian-rupee-sign text-sm sm:text-base"></i>
          <span class="ms-0.5">{{ product.price }}</span>
        </span>
        <span
          *ngIf="product.originalPrice"
          class="text-xs sm:text-sm text-slate-400 line-through font-medium flex items-center"
        >
          <i class="fa-solid fa-indian-rupee-sign text-[10px]"></i>
          <span class="ms-0.5">{{ product.originalPrice }}</span>
        </span>
      </div>

      <!-- Buy / Sold Out Button -->
      <button
        type="button"
        (click)="
          product.inStock !== false
            ? onBuyClick($event)
            : $event.stopPropagation()
        "
        [disabled]="product.inStock === false"
        class="w-full py-2 rounded-xl text-xs sm:text-sm font-bold transition-all text-center shrink-0 shadow-sm"
        [ngClass]="{
          'bg-slate-900 text-white hover:bg-[#FF7620] cursor-pointer active:scale-95':
            product.inStock !== false,
          'bg-slate-100 text-slate-400 cursor-not-allowed':
            product.inStock === false,
        }"
      >
        <span>{{
          product.inStock !== false
            ? "Order on WhatsApp"
            : "Currently Unavailable"
        }}</span>
      </button>
    </div>
  </div>
</div>
