<div
  (click)="onCardClick()"
  class="bg-white border border-slate-100 rounded-2xl overflow-hidden flex flex-col transition-all duration-300 group hover:shadow-lg hover:border-slate-200 cursor-pointer h-full"
>
  <!-- Image Section -->
  <div class="relative aspect-square w-full bg-slate-50 overflow-hidden">
    <img
      [src]="product.images?.[0].url || 'noimage.png'"
      (error)="onImageError($event)"
      class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
      [alt]="product.name"
    />

    <!-- Like Button -->
    <button
      type="button"
      (click)="onToggleSaved($event)"
      class="absolute top-3 right-3 p-2 bg-white/80 backdrop-blur-sm rounded-full shadow-sm hover:bg-white transition-all cursor-pointer"
    >
      <svg
        class="w-4 h-4"
        [class.text-[#FF7620]]="saved"
        [class.text-slate-400]="!saved"
        fill="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
        />
      </svg>
    </button>
  </div>

  <!-- Product Info -->
  <div class="p-4 flex-1 flex flex-col justify-between">
    <div>
      <h3
        class="font-bold text-slate-800 text-base tracking-wide group-hover:text-[#FF7620] transition-colors truncate"
      >
        {{ product.name | titlecase }}
      </h3>
      <p
        class="font-medium text-sm text-slate-400 mt-1 mb-2 line-clamp-2 leading-relaxed"
      >
        {{ product.description || "" }}
      </p>
    </div>

    <!-- Price & Action -->
    <div
      class="flex items-center justify-between pt-4 mt-2 border-t border-slate-50"
    >
      <div class="flex items-center">
        <span class="text-[#FF7620] font-bold text-xl">
          <i class="fa-solid fa-indian-rupee-sign"></i>{{ product.price }}
        </span>
        <span
          *ngIf="product.originalPrice"
          class="text-sm text-slate-500 ms-2 pt-1 line-through font-medium"
        >
          <i class="fa-solid fa-indian-rupee-sign"></i
          >{{ product.originalPrice }}
        </span>
      </div>

      <button
        type="button"
        (click)="onBuyClick($event)"
        class="bg-slate-900 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-[#FF7620] transition-colors cursor-pointer"
      >
        <span>Buy</span>
      </button>
    </div>
  </div>
</div>
