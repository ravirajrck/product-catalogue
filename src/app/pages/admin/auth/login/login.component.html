<!-- Parent Container -->
<div
  class="min-h-screen w-full flex items-center justify-center bg-slate-50 p-4"
>
  <!-- PREMIUM WHITE CARD -->
  <div class="bg-white w-full max-w-md rounded-3xl p-8 shadow-xl">
    <!-- BRAND / LOGO AREA -->
    <div class="text-center mb-8">
      <!-- Logo (Center) -->
      <div class="flex flex-col items-center justify-center mb-8">
        <a href="/" class="block w-[100px] cursor-pointer">
          <img src="SANATAN3LOGO.svg" alt="Logo" class="w-full h-auto" />
        </a>
      </div>
      <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tight">
        Admin Login
      </h2>
      <p class="text-sm text-slate-500 mt-2">Manage your digital ecosystem</p>
    </div>

    <!-- FORM INTERFACE -->
    <form (ngSubmit)="onLogin()" class="space-y-5">
      <!-- EMAIL -->
      <div>
        <label
          class="text-xs font-bold text-slate-500 uppercase tracking-widest block mb-2"
          >Email Address</label
        >
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="admin@rckdigitech.in"
          required
          class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-4 text-sm focus:outline-none focus:border-[#FF7620] focus:ring-2 focus:ring-[#FF7620]/10 text-slate-900 transition-all"
        />
      </div>

      <!-- PASSWORD -->
      <div>
        <label
          class="text-xs font-bold text-slate-500 uppercase tracking-widest block mb-2"
          >Password</label
        >
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
          class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-4 text-sm focus:outline-none focus:border-[#FF7620] focus:ring-2 focus:ring-[#FF7620]/10 text-slate-900 transition-all"
        />
      </div>

      <!-- BUTTON -->
      <button
        type="submit"
        [disabled]="isLoading"
        class="w-full py-4 bg-slate-900 text-white font-bold text-sm uppercase tracking-widest rounded-xl hover:bg-[#FF7620] transition-all duration-300 active:scale-[0.98] cursor-pointer shadow-lg flex items-center justify-center"
      >
        <span *ngIf="isLoading" class="flex items-center justify-center">
          <svg class="animate-spin h-5 w-5 mr-3 text-black" viewBox="0 0 24 24">
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
            ></circle>
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8v8H4z"
            ></path>
          </svg>
          Signing In...
        </span>
        <span *ngIf="!isLoading">Sign In</span>
      </button>
    </form>
  </div>
</div>
