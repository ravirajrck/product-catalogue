<div
  class="min-h-screen bg-cyber-bg text-gray-100 p-6 md:p-12 relative overflow-hidden"
>


  <div class="max-w-6xl mx-auto mb-8 relative z-10">
    <button
      (click)="goBack()"
      class="group flex items-center gap-3 text-slate-500 hover:text-[#FF7620] transition-all duration-300 cursor-pointer"
    >
      <div
        class="w-10 h-10 rounded-full border border-slate-300 flex items-center justify-center group-hover:bg-[#FF7620]/10 group-hover:border-[#FF7620] transition-all shrink-0 relative"
      >
        <div class="absolute inset-0 flex items-center justify-center pb-1">
          <span class="text-xl">←</span>
        </div>
      </div>
      <span class="font-bold tracking-widest text-sm">Back to {{sourceType | titlecase}}</span>
    </button>
  </div>

  <div class="max-w-6xl mx-auto mb-8 relative z-10">
    <h1 class="text-3xl font-black uppercase tracking-widest text-slate-900">
      Product Details
    </h1>
    <p class="text-sm text-slate-500 mt-1">
   Explore features and specifications below.
    </p>
  </div>

  <div
    *ngIf="!loading"
    class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-12 relative z-10"
  >
    <!-- Left: Image Gallery -->
    <div class="flex flex-col-reverse lg:flex-row gap-4">
      <div
        class="flex flex-row lg:flex-col gap-3 justify-center lg:justify-start"
      >
        <div
          *ngFor="let img of [product.imageUrl, product.image2, product.image3]"
          (click)="changeImage(img)"
          [class.border-[#FF7620]]="
            activeImage === img || (!activeImage && img === product.imageUrl)
          "
          class="w-20 h-20 border-2 rounded-xl cursor-pointer overflow-hidden transition-all border-slate-200 hover:border-[#FF7620] bg-slate-50"
        >
          <img
            [src]="img"
            (error)="onImageError($event)"
            class="w-full h-full object-cover"
          />
        </div>
      </div>

      <div
        class="border border-slate-100 rounded-3xl p-2 shadow-sm flex-1 h-[400px] flex items-center justify-center overflow-hidden bg-white"
      >
        <img
          [src]="activeImage || product.imageUrl"
          (error)="onImageError($event)"
          class="max-h-full object-contain rounded-2xl"
        />
      </div>
    </div>

    <!-- Right: Details -->
    <div class="flex flex-col space-y-6">
      <div class="bg-white border border-slate-100 p-8 rounded-3xl shadow-sm">
        <h1
          class="text-3xl font-black text-slate-900 uppercase tracking-tighter mb-4"
        >
          {{ product.name }}
        </h1>

        <div class="flex items-center gap-6 mb-6">
          <span class="text-3xl font-black text-[#FF7620]"
            >₹{{ product.price }}</span
          >
          <span
            *ngIf="product.originalPrice"
            class="text-lg text-slate-400 line-through"
            >₹{{ product.originalPrice }}</span
          >
        </div>

        <div class="border-t border-slate-100 pt-6">
          <h3
            class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3"
          >
            Product Overview
          </h3>
          <p
            class="text-slate-600 leading-relaxed transition-all"
            [class.line-clamp-3]="!isExpanded"
          >
            {{ product.description }}
          </p>
          <button
            *ngIf="product.description?.length > 200"
            (click)="isExpanded = !isExpanded"
            class="text-[#FF7620] text-sm mt-2 cursor-pointer hover:underline font-bold"
          >
            {{ isExpanded ? "Read Less" : "Read More" }}
          </button>
        </div>
      </div>

      <p
        class="text-[10px] text-slate-400 font-medium uppercase tracking-widest mt-3 text-center"
      >
        *Click Enquire Now to discuss details on WhatsApp.
      </p>

      <!-- Action Buttons -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-2">
        <button
          (click)="orderOnWhatsApp()"
          class="col-span-2 py-4 bg-[#FF7620] text-white font-black uppercase tracking-widest rounded-xl hover:bg-orange-600 transition-all active:scale-95 flex items-center justify-center"
        >
          Enquire Now
        </button>

        <button
          (click)="toggleSaved()"
          class="py-4 bg-white border border-slate-200 text-slate-600 rounded-xl hover:border-[#FF7620] hover:text-[#FF7620] transition-all flex items-center justify-center"
        >
          <svg
            class="w-6 h-6"
            [class.fill-[#FF7620]]="isSaved()"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
            />
          </svg>
        </button>

        <button
          (click)="shareProduct()"
          class="py-4 bg-white border border-slate-200 text-slate-600 rounded-xl hover:border-[#FF7620] hover:text-[#FF7620] transition-all flex items-center justify-center"
        >
          <svg
            class="w-6 h-6"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-1.342A3 3 0 0015.316 7.342z"
            />
          </svg>
        </button>
      </div>
    </div>
  </div>
  <div
    *ngIf="loading"
    class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-12 relative z-10 animate-pulse"
  >
    <!-- Left Column: Images -->
    <div class="flex flex-col-reverse lg:flex-row gap-4">
      <!-- Thumbnails -->
      <div class="flex flex-row lg:flex-col gap-3">
        <div class="w-20 h-20 rounded-xl bg-slate-200"></div>
        <div class="w-20 h-20 rounded-xl bg-slate-200"></div>
      </div>
      <!-- Main Image -->
      <div class="flex-1 h-[400px] rounded-2xl bg-slate-200"></div>
    </div>

    <!-- Right Column: Info -->
    <div class="flex flex-col space-y-6">
      <div class="h-64 rounded-2xl bg-slate-100"></div>
      <div class="h-16 rounded-xl bg-slate-100"></div>
    </div>
  </div>
  <div
    *ngIf="!loading"
    class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-2 gap-12 relative z-10"
  >
    <!-- Product content goes here -->
  </div>
</div>
