

  <main
    class="max-w-[1600px] w-full mx-auto px-6 py-8 flex-1 flex flex-col relative z-10"
  >
  
    <div
      class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10 bg-cyber-card p-1 rounded-2xl"
    >
      <div>
        <h1 class="text-3xl font-black text-slate-900 tracking-wider uppercase">
          Explore Catalog
        </h1>
        <p class="text-sm text-slate-500 mt-1">
          Explore our latest arrivals and exclusive collections today.
        </p>
      </div>

      <div class="relative flex items-center w-full md:max-w-md group">
        <input
          type="text"
          [(ngModel)]="searchQuery"
          name="custSearch"
          placeholder="Search products..."
          class="w-full bg-white border border-slate-200 rounded-xl pl-11 pr-10 py-3.5 text-base text-slate-900 placeholder-slate-400 focus:outline-none focus:border-[#FF7620] focus:ring-1 focus:ring-[#FF7620] transition-all duration-300 shadow-sm"
        />

        <!-- Icon -->
        <div
          class="absolute left-4 text-slate-400 group-focus-within:text-[#FF7620] transition-colors duration-300 pointer-events-none"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2.5"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
            ></path>
          </svg>
        </div>

        <!-- Clear Button -->
        <button
          type="button"
          *ngIf="searchQuery"
          (click)="searchQuery = ''"
          class="absolute right-4 text-slate-400 hover:text-[#FF7620] transition-colors font-bold text-xl cursor-pointer"
        >
          &times;
        </button>
      </div>
    </div>

    <div
      class="flex items-center space-x-3 overflow-x-auto pb-4 mb-8 -mx-2 px-2 no-scrollbar"
    >
      <!-- All Items Button -->
      <button
        (click)="selectedCategory = 'all'"
        [class]="
          selectedCategory === 'all'
            ? 'bg-[#FF7620] text-white shadow-lg shadow-orange-200'
            : 'bg-white text-slate-600 border border-slate-200 hover:border-[#FF7620] hover:text-[#FF7620]'
        "
        class="px-5 py-2.5 rounded-xl text-sm font-bold tracking-wide uppercase whitespace-nowrap transition-all duration-300 cursor-pointer"
      >
        All Items
      </button>

      <!-- Category List -->
      <button
        *ngFor="let cat of categoriesList"
        (click)="selectedCategory = cat.id"
        [class]="
          selectedCategory === cat.id
            ? 'bg-[#FF7620] text-white shadow-lg shadow-orange-200'
            : 'bg-white text-slate-600 border border-slate-200 hover:border-[#FF7620] hover:text-[#FF7620]'
        "
        class="px-5 py-2.5 rounded-xl text-sm font-bold tracking-wide uppercase whitespace-nowrap transition-all duration-300 cursor-pointer"
      >
        {{ cat.name }}
      </button>
    </div>

    <div
      *ngIf="isLoading"
      class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-5"
    >
      <div
        *ngFor="let placeholder of [1, 2, 3, 4, 5, 6]"
        class="bg-white border border-slate-100 rounded-2xl p-4 overflow-hidden space-y-4 animate-pulse shadow-sm"
      >
        <!-- Image Placeholder -->
        <div class="aspect-square w-full bg-slate-200 rounded-xl"></div>

        <!-- Title Placeholder -->
        <div class="h-4 bg-slate-200 rounded w-2/3"></div>

        <!-- Description Placeholder -->
        <div class="h-3 bg-slate-100 rounded w-full"></div>

        <!-- Footer/Price Placeholder -->
        <div class="flex justify-between items-center pt-2">
          <div class="h-5 bg-slate-200 rounded w-1/4"></div>
          <div class="h-7 bg-slate-200 rounded w-1/3"></div>
        </div>
      </div>
    </div>
    <div
      *ngIf="!isLoading && filteredProducts.length > 0; else noDataLayout"
      class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-5 flex-1"
    >
      <div
        *ngFor="let prod of filteredProducts"
        (click)="viewProduct(prod.id)"
        class="bg-white border border-slate-100 rounded-2xl overflow-hidden flex flex-col transition-all duration-300 group hover:shadow-lg hover:border-slate-200 cursor-pointer"
      >
        <!-- Image Section -->
        <div class="relative aspect-square w-full bg-slate-50 overflow-hidden">
          <img
            [src]="prod.imageUrl || 'noimage.png'"
            (error)="onImageError($event)"
            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
            alt="{{ prod.name }}"
          />

          <!-- Like Button -->
          <button
            (click)="toggleSaved(prod, $event)"
            class="absolute top-3 right-3 p-2 bg-white/80 backdrop-blur-sm rounded-full shadow-sm hover:bg-white transition-all"
          >
            <svg
              class="w-4 h-4"
              [class.text-[#FF7620]]="isSaved(prod.id)"
              [class.text-slate-400]="!isSaved(prod.id)"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
              />
            </svg>
          </button>
        </div>

        <!-- Product Info -->
        <div class="p-4 flex-1 flex flex-col justify-between">
          <div>
            <h3
              class="font-bold text-slate-900 text-sm tracking-wide group-hover:text-[#FF7620] transition-colors truncate"
            >
              {{ prod.name }}
            </h3>
            <p class="text-xs text-slate-500 mt-1 line-clamp-2 leading-relaxed">
              {{ prod.description || "Premium product details here." }}
            </p>
          </div>

          <!-- Price & Action -->
          <div
            class="flex items-center justify-between pt-4 mt-2 border-t border-slate-50"
          >
            <div class="flex flex-col">
              <span class="text-[#FF7620] font-black text-lg"
                >₹{{ prod.price }}</span
              >
              <span
                *ngIf="prod.originalPrice"
                class="text-[10px] text-slate-400 line-through"
                >₹{{ prod.originalPrice }}</span
              >
            </div>

            <button
              (click)="onOrderNow(prod); $event.stopPropagation()"
              class="px-4 py-2 bg-slate-900 hover:bg-[#FF7620] text-white font-bold text-xs uppercase tracking-wider rounded-xl transition-all duration-300 flex items-center gap-1 active:scale-95"
            >
              <span>Buy</span>
            </button>
          </div>
        </div>
      </div>
    </div>
    <ng-template #noDataLayout>
      <div
        *ngIf="!isLoading"
        class="text-center py-20 text-slate-500 text-sm font-medium tracking-wide flex flex-col items-center justify-center space-y-4 flex-1 bg-white border border-slate-100 rounded-2xl shadow-sm"
      >
        <!-- Icon Container -->
        <div
          class="w-16 h-16 rounded-full bg-slate-50 flex items-center justify-center border border-slate-100 text-slate-400"
        >
          <svg
            class="w-8 h-8"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.5"
              d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"
            ></path>
          </svg>
        </div>

        <!-- Text -->
        <div>
          <h3
            class="text-base font-bold text-slate-900 uppercase tracking-widest"
          >
            No Products Found
          </h3>
          <p class="mt-1 text-slate-400">
            Try adjusting your search or category filter.
          </p>
        </div>
      </div>
    </ng-template>
  </main>
